# AxiomMd-owned handoff envelope example for review/readiness output.
# If output_handoff_path is omitted, default to <package_path>/handoff.packet.yaml.
packet_version: 1
stage: "readiness-and-handoff"
status: "patch-required"
input_ref: "<path/to/input.packet.yaml or feature package dir>"
changed_paths: []
produced_paths:
  - "specs/features/FEAT-xxxx-slug/handoff.packet.yaml"
  - "<optional/path/to/review-note.md>"
evidence_refs:
  - "<path/to/package.yaml>"
  - "<path/to/requirements.yaml>"
  - "<path/to/design.md>"
open_questions: []
next_step: "<next concrete step>"
blockers: []
