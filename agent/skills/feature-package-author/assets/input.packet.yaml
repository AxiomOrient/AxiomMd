# AxiomMd-owned envelope example for AxiomSpecs package authoring.
packet_version: 1
request_summary: "<feature title and short summary>"
target_kind: "feature-package"
source_context_refs:
  - "specs/features/README.md"
output_contract_refs:
  - "README.md"
  - "docs/03_SERVICE_SPEC.md"
  - "specs/STANDARD_STACK.md"
  - "profiles/axiom-v1/profile.yaml"
  - "profiles/axiom-v1/package-and-readiness.shape.yaml"
  - "profiles/axiom-v1/slice.shape.yaml"
  - "profiles/axiom-v1/run-outcome.shape.yaml"
  - "specs/README.md"
scope:
  in:
    - "<bounded feature scope>"
  out:
    - "<explicit non-goal>"
constraints:
  - "mode=create"
  - "feature_id=FEAT-xxxx"
  - "slug=short-slug"
  - "target_feature_path=specs/features/FEAT-xxxx-short-slug"
  - "implementation_order=0"
  - "profile_key=axiom-v1"
  - "review_mode=human_required"
  - "planes=source"
  - "owner_roles=product"
  - "target_repos=AxiomSpecs"
  - "adoption.generic-methodology=direct-use"
done_signals:
  - "required package files and contracts/ directory exist"
  - "workflow_check.py package returns ready for the target package"
open_questions: []
evidence_refs:
  - "specs/README.md"
