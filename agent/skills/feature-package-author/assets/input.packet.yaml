# Generic input packet example for feature package authoring.
# Populate with target-specific values. Add profile constraints if a profile is active.
packet_version: 1
request_summary: "<feature title and short summary>"
target_kind: "feature-package"
source_context_refs:
  - "<path/to/relevant/source/file>"
output_contract_refs:
  - "<path/to/contract/or/spec>"
scope:
  in:
    - "<bounded feature scope>"
  out:
    - "<explicit non-goal>"
constraints:
  - "mode=create"
  - "feature_id=<id>"
  - "slug=<slug>"
  - "target_feature_path=<path/to/feature/dir>"
done_signals:
  - "required package files exist"
  - "workflow_check.py package returns ready for the target package"
open_questions: []
evidence_refs:
  - "<path/to/current/truth/file>"
