$schema: "https://json-schema.org/draft/2020-12/schema"
title: AxiomMd Workflow Artifact
type: object
required:
  - id
  - layer
  - description
  - inputs
  - skills
  - outputs
  - acceptance
  - policies
additionalProperties: true
properties:
  id:
    type: string
    pattern: "^[a-z0-9](?:[a-z0-9-]*[a-z0-9])?$"
    minLength: 3
  layer:
    type: string
    enum: [authoring, execution, shared]
  description:
    type: string
    minLength: 1
  inputs:
    type: array
    items: { type: string, minLength: 1 }
    minItems: 1
  skills:
    type: array
    minItems: 1
    items:
      type: object
      required:
        - id
        - reads
        - writes
      additionalProperties: true
      properties:
        id:
          type: string
          minLength: 1
        reads:
          type: array
          items: { type: string }
        writes:
          type: array
          items: { type: string }
  outputs:
    type: array
    items: { type: string, minLength: 1 }
    minItems: 1
  acceptance:
    type: array
    items: { type: string, minLength: 1 }
    minItems: 1
  policies:
    type: array
    items:
      type: string
      pattern: "^policy/.+\\.md$"
