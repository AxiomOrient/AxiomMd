$schema: "https://json-schema.org/draft/2020-12/schema"
title: AxiomMd Workflow Pipeline
type: object
required:
  - id
  - stages
  - outputs
additionalProperties: true
properties:
  id:
    type: string
    pattern: "^[a-z0-9](?:[a-z0-9-]*[a-z0-9])?$"
    minLength: 3
  description:
    type: string
    minLength: 1
  stages:
    type: array
    minItems: 1
    items:
      type: object
      required: ["workflow"]
      additionalProperties: true
      properties:
        workflow:
          type: string
          minLength: 1
        condition:
          type: string
          minLength: 3
  outputs:
    type: array
    items: { type: string, minLength: 1 }
    minItems: 1
  gates:
    type: array
    items: { type: string, minLength: 1 }
