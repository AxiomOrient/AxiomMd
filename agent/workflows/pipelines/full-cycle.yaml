id: full-cycle
description: raw input -> execution planning -> execution-and-evidence -> reconcile
stages:
  - workflow: authoring/intake-and-routing
  - workflow: authoring/framing
    condition: route.decision.yaml.route == "framing-first"
  - workflow: authoring/feature-package-authoring
  - workflow: authoring/readiness-and-handoff
  - workflow: execution/execution-planning
    condition: readiness-report.md.status == "ready"
  - workflow: execution/execution-and-evidence
    condition: execution.plan.yaml is not null
  - workflow: execution/reconcile-and-close
    condition: evidence.result.json is not null
outputs:
  - readiness-report.md
  - execution.plan.yaml
  - evidence.result.json
  - reconcile.result.yaml
  - handoff.packet.yaml

gates:
  - "intake-and-routing의 route 결과가 유효해야 함"
  - "route가 framing-first면 framing이 실행되어야 함"
  - "readiness-report.md에 명시적 상태가 있어야 함"
  - "readiness-report.md.status == ready여야 execution-planning이 열림"
  - "execution.plan.yaml이 존재해야 execution-and-evidence가 실행됨"
  - "evidence.result.json이 존재해야 reconcile-and-close가 실행됨"
