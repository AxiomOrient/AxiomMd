policy:
  must_requirement_coverage_target: 1.0
  release_invariant_coverage_target: 1.0
  hard_eval_failure_blocks_completion: true
  intent_owner_role: verifier
  intent_change_requires: architect

evals:
  - id: EVAL-0001
    title: "Generated package meets contract baseline"
    kind: blocking
    blocking: true
    hard: true
    req_ids:
      - REQ-0001
    inv_ids:
      - INV-0001
      - INV-0002
    task_ids:
      - TASK-0001
    procedure:
      - "run: python scripts/workflow_check.py package . --json"
      - "verify presence of package.yaml, requirements.yaml, invariants.yaml, design.md, tasks.md, evals.yaml, risks.yaml, decisions.jsonl, slices.yaml, contracts"
    pass_condition: "workflow_check.py 패스 + package 파일 구조 유효성 통과"
    command: "python scripts/workflow_check.py package . --json"
    expected_artifacts:
      - "package.yaml"
      - "requirements.yaml"
      - "design.md"

  - id: EVAL-0002
    title: "Agent dispatcher config and resolution behavior"
    kind: blocking
    blocking: true
    hard: true
    req_ids:
      - REQ-0002
    inv_ids: [""]
    task_ids:
      - TASK-0002
    procedure:
      - "validate each skill has configured executor profile"
      - "surface unknown agent names as explicit error"
    pass_condition: "agent config unknown value returns structured error with remediation"
    command: "axm --config axm.toml run --check-agent-map"
    expected_artifacts: []

  - id: EVAL-0003
    title: "Operator status UX readiness"
    kind: blocking
    blocking: true
    hard: true
    req_ids:
      - REQ-0003
    inv_ids: [INV-0002]
    task_ids:
      - TASK-0003
    procedure:
      - "simulate one stage failure and render status output"
      - "render next_step, open_questions, blockers in status surface"
    pass_condition: "운영자가 stage 단계/실패원인/재개경로를 즉시 확인 가능"
    command: "axm check run --output-status"
    expected_artifacts:
      - ".log/status-event.jsonl"

risks:
  - id: RISK-0001
    title: "Agent API drift"
    severity: medium
    mitigation: "pin CLI protocol version and validate command outputs at startup"

  - id: RISK-0002
    title: "Template drift"
    severity: high
    mitigation: "diff-based gate before package generation and explicit contract snapshots"

  - id: RISK-0003
    title: "Insufficient resume semantics"
    severity: medium
    mitigation: "persist stage checkpoints and deterministic resume target derivation"
