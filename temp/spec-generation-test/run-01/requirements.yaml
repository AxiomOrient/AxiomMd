feature_id: FEAT-0001
title: "axm Workflow-Skill Spec Compiler"
requirements:
  - id: REQ-0001
    title: "PRD-to-spec generation"
    statement: "As an operator, I can submit raw PRD input and receive a complete feature package that satisfies the AxiomMd workflow contracts."
    priority: must
    acceptance:
      - "workflow_check packet + package + route checks pass for generated output."
      - "Generated files include feature package essentials: package.yaml, requirements.yaml, invariants.yaml, design.md, tasks.md, evals.yaml, risks.yaml, decisions.jsonl, slices.yaml, contracts/."
  - id: REQ-0002
    title: "Agent dispatch abstraction"
    statement: "As a platform operator, I can bind skill-to-agent mapping through config and run package creation using codex/gemini/claude profiles."
    priority: must
    acceptance:
      - "Configuration schema supports per-skill default agent selection."
      - "Invalid agent name surfaces clear error + remediation note."
  - id: REQ-0003
    title: "UI/UX status visibility"
    statement: "As an operator, I can inspect pipeline status, logs, and artifact health in a UI/CLI dashboard."
    priority: should
    acceptance:
      - "Live status includes current stage, open questions, blockers, and failure reason."
      - "Artifacts and failed checks are viewable with linkable file references."
  - id: REQ-0004
    title: "Validation and recovery"
    statement: "As a reviewer, I can detect HILT gates and resume from checkpoints without losing state."
    priority: should
    acceptance:
      - "HILT conditions are explicit in handoff outputs or stop logs."
      - "Resume mode can continue from last completed stage."
non_goals:
  - "General-purpose web IDE or code editor in V1"
  - "Automated execution of arbitrary untrusted code without operator approval"
