policy:
  must_requirement_coverage_target: 1.0
  release_invariant_coverage_target: 1.0
  hard_eval_failure_blocks_completion: true
  intent_owner_role: verifier
  intent_change_requires: architect

evals:
  - id: EVAL-0001
    title: "Generated package meets contract baseline"
    kind: blocking
    blocking: true
    hard: true
    req_ids:
      - REQ-0001
    inv_ids:
      - INV-0001
      - INV-0002
    task_ids:
      - TASK-0001
    procedure:
      - "run: python scripts/workflow_check.py --strict --json packet temp/spec-generation-test/run-02/input.packet.yaml"
      - "run: python scripts/workflow_check.py --base-dir temp/spec-generation-test/run-02 --json package temp/spec-generation-test/run-02"
      - "run: python scripts/workflow_check.py --base-dir temp/spec-generation-test/run-02 --strict --json pipeline temp/spec-generation-test/run-02"
    pass_condition: "workflow_check.py passes all requested stages and required fields are present"
    command: "python scripts/workflow_check.py --base-dir temp/spec-generation-test/run-02 --strict --json pipeline temp/spec-generation-test/run-02"
    expected_artifacts:
      - "package.yaml"
      - "requirements.yaml"
      - "design.md"

  - id: EVAL-0002
    title: "File-cache checkpoint persistence and resume"
    kind: blocking
    blocking: true
    hard: true
    req_ids:
      - REQ-0003
    inv_ids: ["INV-0001"]
    task_ids:
      - TASK-0002
    procedure:
      - "simulate interrupted run and write checkpoint to `.axm/run/<run_id>/state.jsonl`"
      - "resume command resolves target by explicit run_id and reads last successful stage from cache"
      - "verify no duplicate stage execution after resume"
    pass_condition: "resume mode restores last-good stage from run-id scoped deterministic cache snapshot"
    command: "axm resume --from-cache"
    expected_artifacts:
      - ".axm/run/<run_id>/state.jsonl"

  - id: EVAL-0003
    title: "TUI operator status readiness"
    kind: blocking
    blocking: true
    hard: true
    req_ids:
      - REQ-0002
    inv_ids: ["INV-0002"]
    task_ids:
      - TASK-0003
    procedure:
      - "run axm status --watch with synthetic failure"
      - "confirm TUI shows stage, blockers, open_questions, produced_paths, evidence_refs"
    pass_condition: "operators can recover next-step and resume command from TUI output"
    command: "axm status --watch"
    expected_artifacts:
      - "temp/spec-generation-test/run-02/run-ui-snapshot.log"
