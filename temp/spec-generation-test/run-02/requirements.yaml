feature_id: FEAT-0001
title: "axm Workflow-Skill Spec Compiler"
requirements:
  - id: REQ-0001
    title: "PRD-to-spec generation"
    statement: "As an operator, I can submit raw PRD input and receive a complete feature package that satisfies AxiomMd workflow contracts."
    priority: must
    acceptance:
      - "workflow_check packet + package + route checks pass for generated output"
      - "Generated files include: package.yaml, requirements.yaml, invariants.yaml, design.md, tasks.md, evals.yaml, risks.yaml, decisions.jsonl, slices.yaml, contracts/"

  - id: REQ-0002
    title: "TUI status and control surface"
    statement: "As an operator, I can inspect pipeline status, logs, and open questions in a TUI with resumable navigation."
    priority: should
    acceptance:
      - "TUI exposes current stage, blockers, next_step, and command hints"
      - "TUI supports filtering by stage and search across artifact paths"
      - "Failure reasons are displayed with linkable file references"

  - id: REQ-0003
    title: "File-cache resume persistence"
    statement: "As an operator, I can resume from checkpoint using file-cache state after interruption."
    priority: must
    acceptance:
      - "checkpoint writes include package path, stage, produced_paths, evidence_refs"
      - "resume can continue from last completed stage without manual reconstruction"
      - "cache retention is keyed by run_id, stored under .axm/run/<run_id>/state.jsonl, and deterministic for replay"

  - id: REQ-0004
    title: "Validation and recovery"
    statement: "As a reviewer, I can detect HILT gates and resume from checkpoints without losing state."
    priority: should
    acceptance:
      - "HILT conditions are explicit in handoff outputs or stop logs"
      - "Resume mode can continue from last completed stage"

non_goals:
  - "General-purpose web IDE or full TUI code editor"
  - "Automated execution of arbitrary untrusted code without operator approval"
